<!DOCTYPE html>
<html>

<head>

    <title>Netherlands – Web GIS Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/marslan390/BeautifyMarker/leaflet-beautify-marker-icon.css">

</head>

<body>
    <header>
        <i class="fa-solid fa-map-location-dot" style="color:#2563eb;font-size:18px;"></i>
        <h1>Netherlands – Major Cities &amp; Regions</h1>
    </header>

 <input id="searchBox" class="ui-box" type="text" placeholder="Search city...">

<div id="filterBox" class="ui-box">
        <label><strong>Filter by Population</strong></label><br>
        <input id="populationSlider" type="range" min="0" max="1000000" step="50000" value="0">
        <div id="populationValue">0</div>
    </div>
    <!-- Map container -->
    <div id="map"></div>

    <!-- Leaflet JS (FIRST) -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- MarkerCluster JS (SECOND) -->
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <!-- BeautifyMarker (THIRD) -->
    <script src="https://cdn.jsdelivr.net/gh/marslan390/BeautifyMarker/leaflet-beautify-marker-icon.js"></script>

    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/8d96376049.js"></script>

    <!-- YOUR JS (LAST ALWAYS) -->
    <script src="js/main.js"></script>

</body>

</html>
